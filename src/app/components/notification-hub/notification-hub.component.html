<div class="hub-container">
  <div class="hub-header">
    <div class="title-group">
      <h3>centralNotificationHub</h3>
      <span class="unread-badge">{{ getUnreadCount() }} Unread</span>
    </div>
    <div class="actions">
      <button (click)="markAllRead()">Mark All Read</button>
      <button (click)="unmarkAllRead()">Unmark All as Read</button>
      <button (click)="markSelectedRead()">Mark Selected Read</button>
      <button (click)="markSelectedUnread()">Mark Selected Unread</button>
      <button (click)="clearAll()" class="danger">Purge Logs</button>
      <button (click)="restoreArchived()">Unpurge Logs</button>
    </div>
  </div>

  <div class="notification-list">
    @for (n of notifications; track n) {
      <div
        class="notification-item"
        [class.unread]="!n.isRead"
        [class]="n.type">
        <input type="checkbox" class="select-box" [checked]="selectedIds.has(n.id)" (change)="toggleSelected(n.id)">
        <div class="type-indicator"></div>
        <div class="content">
          <div class="item-header">
            <strong>{{ n.title }}</strong>
            <span class="time">{{ n.timestamp | date:'shortTime' }}</span>
          </div>
          <p>{{ n.message }}</p>
          <div class="item-footer">
            <span class="priority" [class]="n.priority">{{ n.priority | uppercase }}</span>
            <span class="type-tag">{{ n.type | uppercase }}</span>
          </div>
        </div>
        <!-- Extra heavy nested elements -->
        <div class="audit-log-hidden">
          @for (i of [1,2,3]; track i) {
            <div class="log-entry">LOG_SEQ_{{i * 1000}}</div>
          }
        </div>
      </div>
    }
  </div>
</div>
