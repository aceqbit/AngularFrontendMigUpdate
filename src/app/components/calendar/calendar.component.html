<div class="calendar-container">
  <div class="calendar-header">
    <button (click)="prevMonth()">◀</button>
    <h2>{{ getMonthName() }}</h2>
    <button (click)="nextMonth()">▶</button>
  </div>

  <div class="calendar-grid">
    <div *ngFor="let day of weekdays" class="weekday-header">{{ day }}</div>
    
    <div *ngFor="let day of days" 
         class="calendar-day" 
         [class.today]="day.isToday"
         [class.not-current]="!day.isCurrentMonth">
      
      <div class="day-top">
        <span class="day-number">{{ day.date | date:'d' }}</span>
        <span class="lunar-phase" [title]="day.lunarPhase">{{ day.lunarPhase }}</span>
      </div>

      <div class="day-content">
        <div *ngIf="day.holiday" class="holiday-badge">{{ day.holiday }}</div>
        
        <div class="weather-info" *ngIf="day.weather">
          <span>{{ day.weather.icon }}</span>
          <span>{{ day.weather.temp }}°C</span>
        </div>

        <div class="events-container">
          <div *ngFor="let event of day.events" 
               class="event-pill" 
               [style.border-left-color]="event.color">
            {{ event.title }}
          </div>
        </div>

        <!-- Stress test metrics -->
        <div class="metrics-overlay">
          <div class="metric-bar" [style.width.%]="day.metrics?.cpu" [style.background]="'#ff5252'"></div>
          <div class="metric-bar" [style.width.%]="day.metrics?.memory" [style.background]="'#448aff'"></div>
        </div>
      </div>

      <!-- Extra heavy nesting to stress DOM -->
      <div class="day-meta-hidden">
        <div *ngFor="let i of [1,2,3,4,5]" class="dummy-data-point"></div>
      </div>
    </div>
  </div>
</div>
