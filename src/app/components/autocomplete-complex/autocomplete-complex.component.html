<div class="autocomplete-wrapper">
  <div class="search-input-container">
    <input type="text" 
           [(ngModel)]="query" 
           (input)="onInput()" 
           placeholder="Search across enterprise..."
           class="main-search">
    <div class="loader" *ngIf="isLoading"></div>
  </div>

  <div class="results-dropdown" *ngIf="query.length >= 2">
    <div *ngIf="results.length === 0 && !isLoading" class="no-results">
      No matches found for "{{query}}"
    </div>

    <div *ngFor="let category of getGroupKeys()" class="category-group">
      <div class="category-header">{{ category }} ({{ groupedResults[category].length }})</div>
      
      <div *ngFor="let item of groupedResults[category]" class="result-item" (click)="selectResult(item)">
        <img [src]="item.image" class="item-thumb">
        <div class="item-info">
          <div class="item-title" [innerHTML]="highlightMatch(item.title)"></div>
          <div class="item-desc" [innerHTML]="highlightMatch(item.description)"></div>
          <div class="item-meta">
            <span class="score">Relevance: {{ item.score | number:'1.0-0' }}%</span>
            <span class="id">ID: {{ item.id }}</span>
          </div>
        </div>
        <!-- Extra complex elements to increase DOM weight -->
        <div class="item-actions-hidden">
          <button *ngFor="let i of [1,2,3,4]">Action {{i}}</button>
        </div>
      </div>
    </div>
  </div>

  <div class="search-stats" *ngIf="query.length >= 2">
    Scanned 1,000 items in {{ 300 }}ms
  </div>
</div>
