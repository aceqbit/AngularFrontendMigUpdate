<div class="board" (mousemove)="onMouseMove($event)" (mouseup)="onMouseUp()">
  <div class="board-header">
    <h1>Heavy Sticky Board</h1>
    <button class="add-btn" (click)="addNote()">+ Add New Note</button>
    <div class="stats">
      <span>Total Notes: {{notes.length}}</span>
      <span>Pinned: {{ getPinnedCount() }}</span>
    </div>
  </div>

  <div class="notes-container">
    <div *ngFor="let note of notes; trackBy: trackByNoteId" 
         class="note" 
         [style.left.px]="note.x" 
         [style.top.px]="note.y" 
         [style.background-color]="note.color"
         [class.pinned]="note.isPinned"
         (mousedown)="onMouseDown($event, note)">
      
      <div class="note-header">
        <input [(ngModel)]="note.title" class="note-title-input" placeholder="Title...">
        <div class="actions">
          <button (click)="togglePin(note)" [title]="note.isPinned ? 'Unpin' : 'Pin'">
            <i class="pin-icon">{{ note.isPinned ? '📍' : '📌' }}</i>
          </button>
          <button (click)="changeColor(note)" title="Change Color">🎨</button>
          <button (click)="deleteNote(note.id)" title="Delete">❌</button>
        </div>
      </div>

      <div class="note-body">
        <textarea [value]="note.content" 
                  (input)="updateNoteContent(note, $event)"
                  placeholder="Type something heavy..."></textarea>
      </div>

      <div class="note-footer">
        <span class="timestamp">Last edited: {{note.lastModified | date:'short'}}</span>
        <div class="tags">
          <span *ngFor="let tag of note.tags" class="tag">{{tag}}</span>
        </div>
        <div class="priority-indicator" [class]="note.priority">
          {{note.priority | uppercase}}
        </div>
      </div>

      <!-- Complex nested elements to increase DOM weight -->
      <div class="heavy-decor">
        <div class="decor-line"></div>
        <div class="decor-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>
</div>
